<style>

}

}

.act{

}

.detail-card:after{content:"";position:absolute;left:-200px;top:-220px;width:440px;height:440px;border-radius:999px;background: radial-gradient(circle, rgba(6,182,212,.16), transparent 70%);pointer-events:none}
.kicker{display:inline-flex;align-items:center;gap:10px;min-height:34px;padding:0 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);color:rgba(246,247,251,.86);font-size:11px;font-weight:950;letter-spacing:.12em;text-transform:uppercase}
.h2{margin:14px 0 0;font-size:clamp(28px, 6vw, 54px);letter-spacing:-.06em;line-height:.95}
.desc{margin:12px 0 0;color:var(--muted);line-height:1.9}
.bigunits{display:grid;grid-template-columns:repeat(4, minmax(0,1fr));gap:10px;margin-top:18px}

  border-radius:18px;border:1px solid rgba(255,255,255,.10);
  background:rgba(10,13,20,.66);
  backdrop-filter: blur(16px);-webkit-backdrop-filter: blur(16px);
  box-shadow: 0 16px 58px rgba(0,0,0,.45);
  display:grid;grid-template-columns:repeat(3,1fr);padding:8px;z-index:20
}
.navbtn{border:none;background:transparent;color:var(--muted);border-radius:14px;padding:10px 10px;cursor:pointer;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;font-weight:950;letter-spacing:.02em;transition:.16s ease}
.navbtn span{font-size:11px;letter-spacing:.10em;text-transform:uppercase}
.navbtn.active{color:var(--text);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.18s ease;z-index:30}
.overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;left:12px;top:12px;bottom:12px;
  width:min(360px, calc(100% - 24px));
  border-radius:22px;border:1px solid rgba(255,255,255,.10);
  background:rgba(10,13,20,.82);
  backdrop-filter: blur(16px);-webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
  transform: translateX(-110%);transition:.20s ease;
  z-index:31;padding:16px;display:flex;flex-direction:column;gap:10px
}
.drawer.open{transform: translateX(0)}
.drawer h3{margin:4px 0 0;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:rgba(246,247,251,.85)}
.drawer .muted{color:var(--muted);font-size:13px;line-height:1.7}
.drawer a.btn,.drawer button.btn{width:100%;justify-content:flex-start}
.toast{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(90px + var(--safe-b));
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter: blur(14px);-webkit-backdrop-filter: blur(14px);
  color:var(--text);border-radius:14px;padding:10px 12px;font-weight:950;font-size:13px;
  opacity:0;pointer-events:none;transition:.18s ease;z-index:40
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-2px)}
@media (max-width: 980px){
  .toolbar{grid-template-columns:1fr}

      <div class="appbar-inner">
        <div class="left"><a class="iconbtn" href="hub.html" aria-label="Geri">←</a></div>

      <button class="navbtn" type="button" onclick="location.href='hub.html#fav'"><div>⭐</div><span>Fav</span></button>
    </nav>

    <div class="toast" id="toast">—</div>
  </div>

<script>
(() => {
  const TZ='Europe/Istanbul';
  const COUNTER={"id": "ramazan-bayrami", "title": "Ramazan Bayramı 2026", "category": "Özel Gün", "tag": "Bayram", "desc": "Ramazan Bayramı 1. güne kalan süre.", "type": "fixed", "target": "2026-03-21T00:00", "page": "c-ramazan-bayrami.html"};
  const cities=["Adana", "Adıyaman", "Afyonkarahisar", "Ağrı", "Amasya", "Ankara", "Antalya", "Artvin", "Aydın", "Balıkesir", "Bilecik", "Bingöl", "Bitlis", "Bolu", "Burdur", "Bursa", "Çanakkale", "Çankırı", "Çorum", "Denizli", "Diyarbakır", "Edirne", "Elazığ", "Erzincan", "Erzurum", "Eskişehir", "Gaziantep", "Giresun", "Gümüşhane", "Hakkari", "Hatay", "Isparta", "Mersin", "İstanbul", "İzmir", "Kars", "Kastamonu", "Kayseri", "Kırklareli", "Kırşehir", "Kocaeli", "Konya", "Kütahya", "Malatya", "Manisa", "Kahramanmaraş", "Mardin", "Muğla", "Muş", "Nevşehir", "Niğde", "Ordu", "Rize", "Sakarya", "Samsun", "Siirt", "Sinop", "Sivas", "Tekirdağ", "Tokat", "Trabzon", "Tunceli", "Şanlıurfa", "Uşak", "Van", "Yozgat", "Zonguldak", "Aksaray", "Bayburt", "Karaman", "Kırıkkale", "Batman", "Şırnak", "Bartın", "Ardahan", "Iğdır", "Yalova", "Karabük", "Kilis", "Osmaniye", "Düzce"];
  const STORAGE_FAV='sayachane-favorites-v1';
  const STORAGE_CITY='sayachane-city-v1';
  const $=(id)=>document.getElementById(id);
  let toastT=null;
  function showToast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1600);}

  function two(n){ return String(n).padStart(2,'0'); }
  function fmtDT(d){ return new Intl.DateTimeFormat('tr-TR', { timeZone: TZ, day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' }).format(d); }
  function countdown(target){ const diff=target.getTime()-Date.now(); const abs=Math.floor(Math.abs(diff)/1000); return { dir: diff>=0?'future':'past', d:Math.floor(abs/86400), h:Math.floor((abs%86400)/3600), m:Math.floor((abs%3600)/60), s:abs%60 }; }
  function unitsHTML(p){ const map=[['d','Gün'],['h','Saat'],['m','Dakika'],['s','Saniye']]; return map.map(([k,l])=>`<div class="bu"><strong>${two(p[k])}</strong><span>${l}</span></div>`).join(''); }
  function parsePrayerTime(t){ if(!t) return null; const [h,m]=String(t).split(':').map(Number); if(Number.isNaN(h)||Number.isNaN(m)) return null; const d=new Date(); d.setHours(h,m,0,0); if(d.getTime()<Date.now()) d.setDate(d.getDate()+1); return d; }
  function nextSaturday(){ const d=new Date(); const day=d.getDay(); const add=(6-day+7)%7; const t=new Date(d); t.setDate(d.getDate() + (add===0?7:add)); t.setHours(0,0,0,0); return t; }
  function getParam(name){ return new URL(window.location.href).searchParams.get(name)||''; }
  function normalizeCity(c){ return cities.includes(c) ? c : 'İstanbul'; }

  // favorites
  function loadFav(){ try{ return new Set(JSON.parse(localStorage.getItem(STORAGE_FAV)||'[]')); }catch(e){ return new Set(); } }
  function saveFav(set){ localStorage.setItem(STORAGE_FAV, JSON.stringify(Array.from(set))); }
  let fav=loadFav();
  function syncFavBtn(){ $('favBtn').textContent = fav.has(COUNTER.id) ? '⭐' : '☆'; }
  syncFavBtn();
  $('favBtn').onclick=()=>{ if(fav.has(COUNTER.id)){ fav.delete(COUNTER.id); showToast('Favoriden çıkarıldı'); } else { fav.add(COUNTER.id); showToast('Favoriye eklendi'); } saveFav(fav); syncFavBtn(); };

  async function share(){ const url=window.location.href;
    try{ if(navigator.share) await navigator.share({title:COUNTER.title,text:COUNTER.desc,url});
         else { await navigator.clipboard.writeText(url); showToast('Link kopyalandı'); } }
    catch(e){ try{ await navigator.clipboard.writeText(url); showToast('Link kopyalandı'); }catch(_){ showToast('Paylaşım yapılamadı'); } }
  }
  $('shareBtn').onclick=share;

  async function fetchPrayer(city){
    const now=new Date(); const dd=String(now.getDate()).padStart(2,'0'); const mm=String(now.getMonth()+1).padStart(2,'0'); const yyyy=now.getFullYear();
    const date=`${dd}-${mm}-${yyyy}`;
    const url=`https://api.aladhan.com/v1/timingsByCity/${date}?city=${encodeURIComponent(city)}&country=Turkey&method=13`;
    try{ const res=await fetch(url, { cache:'no-store' }); const json=await res.json(); return (json && json.data && json.data.timings) ? json.data.timings : {}; }
    catch(e){ return {}; }
  }

  // target resolver
  let target=null; let subtitle='';
  async function init(){
    if(COUNTER.type==='fixed'){ target=new Date(COUNTER.target); subtitle='Hedef: '+fmtDT(target); return; }
    if(COUNTER.dynamic==='endOfDay'){ target=new Date(); target.setHours(23,59,59,999); subtitle='Hedef: '+fmtDT(target); return; }
    if(COUNTER.dynamic==='nextSaturday'){ target=nextSaturday(); subtitle='Hedef: '+fmtDT(target); return; }
    if(COUNTER.dynamic==='iftar' || COUNTER.dynamic==='sahur'){
      const stored = localStorage.getItem(STORAGE_CITY) || 'İstanbul';
      const city = normalizeCity(decodeURIComponent(getParam('city') || stored));
      const t = await fetchPrayer(city);
      const timeText = COUNTER.dynamic==='iftar' ? t.Maghrib : t.Fajr;
      target = parsePrayerTime(timeText) || new Date(Date.now() + (COUNTER.dynamic==='iftar'?2:3)*3600*1000);
      subtitle = `Şehir: ${city} • Hedef: ${fmtDT(target)}`;
      $('desc').textContent = COUNTER.desc + ' (Şehir: ' + city + ')';
      return;
    }
    target = new Date(Date.now()+3600*1000);
    subtitle='Hedef: '+fmtDT(target);
  }

  function tick(){
    if(!target || Number.isNaN(target.getTime())){ $('units').innerHTML=''; $('meta').textContent='Hedef bulunamadı.'; return; }
    const p=countdown(target);
    $('units').innerHTML=unitsHTML(p);
    $('meta').textContent = subtitle + (p.dir==='future' ? ' • Geri sayım sürüyor' : ' • Süre geçti');
  }
  init().then(()=>{ tick(); setInterval(tick, 1000); });
})();
</script>
</body>
</html>
